name: QE Benchmark Batch

# Paper 1 DFT runner. Dispatched manually (pilot) or by a matrix over a
# tier list. Each job:
#   1. Installs QE via micromamba (conda-forge::quantum-espresso)
#   2. Stages the input CIF + SSSP pseudos
#   3. Runs pw.x SCF (and optionally NSCF/DOS/bands)
#   4. Uploads the provenance zip as an artifact
#
# Public repos: unlimited Actions minutes. Private repos: 2,000 min/month.

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Which tier to run"
        required: true
        default: "pilot"
        type: choice
        options: [pilot, A, B, C]
      material:
        description: "Formula (pilot mode only). Ignored for A/B/C."
        required: false
        default: "Si"
      steps:
        description: "QE steps: comma-sep from scf,nscf,dos,bands,relax"
        required: false
        default: "scf"

concurrency:
  # Same tier concurrent runs are OK; same tier + same sha is not.
  group: qe-batch-${{ github.ref }}-${{ inputs.tier }}
  cancel-in-progress: false

jobs:
  # --- 1. Expand the tier list into a job matrix -------------------------
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Build material matrix
        id: pick
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' > matrix.json
          import json, os, sys, tomllib
          from pathlib import Path

          tier = os.environ["TIER"]
          material = os.environ.get("MATERIAL", "Si")
          root = Path("research/paper1-benchmark/materials")

          def load(t):
              p = root / f"tier_{t.lower()}.toml"
              if not p.exists():
                  return []
              with p.open("rb") as f:
                  return tomllib.load(f)["material"]

          if tier == "pilot":
              entries = [{"formula": material, "structure": "diamond", "mp_id": ""}]
          else:
              entries = load(tier)

          # Trim to the keys the shell steps need.
          out = []
          for e in entries:
              out.append({
                  "formula":   e.get("formula", ""),
                  "structure": e.get("structure", ""),
                  "mp_id":     e.get("mp_id", ""),
              })
          print(json.dumps({"include": out}))
          PY
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"
        env:
          TIER: ${{ inputs.tier }}
          MATERIAL: ${{ inputs.material }}

  # --- 2. Fan out one job per material ----------------------------------
  run-qe:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    timeout-minutes: 350      # GH Actions hard cap is 6h per job
    steps:
      - uses: actions/checkout@v4

      - name: Install Quantum ESPRESSO + ASE (conda-forge)
        shell: bash
        run: |
          set -euo pipefail
          # conda-forge ships QE under the package name `qe` (not
          # `quantum-espresso`). This build is MUCH cleaner than Ubuntu's
          # apt package which crashes with __fortify_fail on certain
          # inputs. ~2 minutes first time, cached on subsequent runs.
          mkdir -p "$HOME/bin"
          curl -L https://micro.mamba.pm/api/micromamba/linux-64/latest \
            | tar -xvj -C "$HOME" bin/micromamba
          export PATH="$HOME/bin:$PATH"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          export MAMBA_ROOT_PREFIX="$HOME/micromamba"
          echo "MAMBA_ROOT_PREFIX=$HOME/micromamba" >> "$GITHUB_ENV"
          micromamba create -y -n qe -c conda-forge python=3.12 qe ase spglib
          micromamba run -n qe pw.x -version 2>&1 | head -3 || true
          micromamba run -n qe python3 -c "import ase; print('ase', ase.__version__)"

      - name: Resolve CIF (fixture first, then Materials Project)
        shell: bash
        env:
          MP_API_KEY: ${{ secrets.MP_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p work
          cd work
          formula="${{ matrix.formula }}"
          mp_id="${{ matrix.mp_id }}"
          fixture="${GITHUB_WORKSPACE}/research/paper1-benchmark/materials/fixtures/${formula}.cif"

          if [ -f "$fixture" ]; then
            cp "$fixture" "${formula}.cif"
            echo "✓ using bundled fixture: $fixture ($(wc -c < "${formula}.cif") bytes)"
            exit 0
          fi

          if [ -n "$mp_id" ] && [ -n "${MP_API_KEY:-}" ]; then
            python3 - <<PY
          import sys
          sys.path.insert(0, "${GITHUB_WORKSPACE}/research/paper1-benchmark")
          from orchestrator.mp_client import MPClient
          cif = MPClient().cif("${mp_id}")
          open("${formula}.cif", "w").write(cif)
          print(f"✓ fetched from MP: ${formula}.cif ({len(cif)} bytes)")
          PY
            exit 0
          fi

          echo "::error::no fixture and (no mp_id OR no MP_API_KEY) for $formula"
          exit 1

      - name: Generate pw.x input
        shell: bash
        run: |
          set -euo pipefail
          cd work
          micromamba run -n qe python3 - <<'PY'
          import os, sys
          sys.path.insert(0, os.environ["GITHUB_WORKSPACE"] + "/research/paper1-benchmark")
          from pathlib import Path
          from ase.io import read, write
          from orchestrator.qe_inputs import suggest_config

          formula = "${{ matrix.formula }}"
          cif = Path(f"{formula}.cif")
          if not cif.exists():
              print("::error::no CIF present, cannot proceed")
              sys.exit(1)
          atoms = read(str(cif))
          elements = sorted({a.symbol for a in atoms})
          cfg = suggest_config(elements)
          # ase's espresso-in writer takes pseudopotentials dict + kspacing
          pseudos = {el: f"{el}.upf" for el in elements}
          write(
              f"{formula}.scf.in",
              atoms,
              format="espresso-in",
              input_data={
                  "calculation": "scf",
                  "prefix": formula,
                  "pseudo_dir": "./pseudo",
                  "outdir": "./tmp",
                  "ecutwfc": cfg.ecutwfc,
                  "ecutrho": cfg.ecutrho,
                  "occupations": "smearing",
                  "smearing": cfg.smearing,
                  "degauss": cfg.degauss,
                  "conv_thr": cfg.conv_thr,
                  "mixing_beta": 0.4,
              },
              pseudopotentials=pseudos,
              kpts=list(cfg.kpoints),
          )
          print(f"wrote {formula}.scf.in  ecutwfc={cfg.ecutwfc}Ry k={cfg.kpoints}")
          PY

      - name: Stage pseudopotentials (bundled ONCV PBE)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p work/pseudo
          cd work
          # SSSP Efficiency pseudos bundled in the repo. The elements
          # covered today: Si, Ga, As, N. We copy + rename them to
          # {Element}.upf so ASE-generated input files are portable.
          python3 - <<'PY'
          import os, re, shutil, sys
          from pathlib import Path
          src = Path(os.environ["GITHUB_WORKSPACE"]) / "research/paper1-benchmark/materials/pseudos"
          dst = Path("pseudo")
          staged = []
          for upf in src.glob("*.upf"):
              m = re.match(r"([A-Z][a-z]?)[_.].*\.upf$", upf.name)
              if m:
                  out = dst / f"{m.group(1)}.upf"
                  shutil.copy(upf, out)
                  staged.append(out.name)
          print("staged:", ", ".join(staged) or "(none)")
          PY

      - name: Run pw.x (SCF)
        id: scf
        shell: bash
        run: |
          set -euo pipefail
          cd work
          formula="${{ matrix.formula }}"
          t0=$(date +%s)
          micromamba run -n qe mpirun -n 2 --oversubscribe pw.x -in "${formula}.scf.in" > "${formula}.scf.out" 2>&1 || {
            echo "::error::pw.x failed. Last 40 lines:"
            tail -40 "${formula}.scf.out" >&2
            exit 1
          }
          t1=$(date +%s)
          echo "wall_seconds=$((t1 - t0))" >> "$GITHUB_OUTPUT"
          grep -E "^!.*total energy" "${formula}.scf.out" || true
          grep -E "Fermi energy" "${formula}.scf.out" || true

      - name: Bundle provenance
        shell: bash
        run: |
          set -euo pipefail
          cd work
          python3 - <<PY
          import sys
          sys.path.insert(0, "${GITHUB_WORKSPACE}/research/paper1-benchmark")
          from pathlib import Path
          from orchestrator.provenance import bundle_dft_run, current_env

          formula = "${{ matrix.formula }}"
          env = current_env()
          qin = Path(f"{formula}.scf.in").read_text()
          qout = Path(f"{formula}.scf.out").read_text()
          obs = {"wall_seconds": ${{ steps.scf.outputs.wall_seconds || 0 }}}
          out = bundle_dft_run(
              Path("bundles"),
              material=formula,
              qe_input=qin,
              qe_output=qout,
              observables=obs,
              env=env,
          )
          print(f"wrote {out}")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qe-${{ matrix.formula }}
          path: work/bundles/*.zip
          retention-days: 14
          if-no-files-found: error
