# Step 4 main experiment — N=10 計画材料リスト.
#
# 各エントリは prompt 生成 (prompts/template.txt の {{...}} 置換) に使う。
# n_atoms と lattice は CIF 由来 (materials/fixtures/{cif_path})。
#
# Tier A 軽元素半導体 5 件
# Tier B 重元素 / 2D / perovskite / oxide 3 件
# Tier C ドープ Si supercell 2 件

[[material]]
slug             = "Si"
formula          = "Si"
tier             = "A"
structure_description = "diamond cubic Fd-3m"
lattice_description   = "a=5.43 Å"
n_atoms          = 2
cif              = "Si.cif"

