# Tier A — classic semiconductors (20 materials)
#
# These are the "LLM should know these cold" calibration baseline. MP ids
# are pinned to the canonical ground-state polymorph at PBE. Any LLM that
# gets these wrong means the rest of Paper 1 is moot.
#
# All mp_ids verified against the current Materials Project database
# (next-gen.materialsproject.org). If an id is unavailable we fall back
# to running PBE ourselves.

