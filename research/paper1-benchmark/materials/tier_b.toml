# Tier B — PV / emerging / 2D materials (25 materials)
#
# The "LLM under pressure" set. Classic LLM training data is thin on these
# (halide perovskites post-2013, chalcogenides, 2D TMDCs), so systematic
# LLM vs PBE error bars here are the real differentiator of Paper 1.
#
# mp_ids are the Materials Project canonical ground-state polymorph where
# known. Items marked `# mp_verify` have ids I'm not 100% sure of — they
# will be confirmed by `python3 -m orchestrator mp-sync --tier B` once an
# MP_API_KEY is available, and wrong ids will surface as lookup errors.

# ====================================================================
#   Halide perovskites (6) — the PV hot-topic of the last decade
# ====================================================================

