# Tier C — doped Si supercells (12 materials)
#
# Paper 1's differentiator. LLMs know "Si:P is n-type" but cannot
# reliably predict:
#   - donor/acceptor level position relative to CBM/VBM
#   - formation energy of the dopant
#   - lattice relaxation around the dopant
#   - how these change with concentration
#
# All entries are GENERATED from pristine Si (no MP id). The recipe
# fields drive orchestrator/doped_si_gen.py. CIFs are written to
# materials/fixtures/ on demand and NOT committed.
#
# Fields:
#   recipe.type          = substitutional | vacancy | interstitial
#   recipe.supercell     = "2x2x2" | "3x3x3" | "4x4x4" of Si diamond conv
#   recipe.dopant        = element symbol (substitutional/interstitial)
#   recipe.site_index    = which Si atom to replace (int, 0-based, in
#                          supercell order). Omit for random-centre.
#   recipe.a_ang         = Si lattice constant (default 5.43)
#
# Expected cell sizes:
#   2x2x2 → 64 atoms
#   3x3x3 → 216 atoms (too heavy for Actions free tier; needed for
#                      dilute concentrations only)

# ====================================================================
#   64-atom supercells (1.56% concentration) — base benchmark
# ====================================================================

[[material]]
formula   = "Si63P1"
structure = "Si 2x2x2 substitutional"
tier      = "C"
notes     = "n-type donor, classic n-Si"
recipe    = { type = "substitutional", supercell = "2x2x2", dopant = "P",  site_index = 0 }

